<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <title>The Rockford Arms | The Build</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0d;
      --bg-soft:#141414;
      --cream:#f4efe6;
      --cream-dim:#c9c4b8;
      --copper:#cd7f32;
      --copper-light:#d4954a;
      --text:#999;
    }
    html{scroll-behavior:smooth}
    body{
      font-family:'Manrope',sans-serif;
      background:var(--bg);
      color:var(--cream);
      line-height:1.7;
      -webkit-font-smoothing:antialiased;
    }
    ::selection{background:var(--copper);color:var(--bg)}
    .label{
      font-size:.7rem;
      font-weight:500;
      letter-spacing:.3em;
      text-transform:uppercase;
      color:var(--copper);
    }
    /* NAV */
    nav{
      position:fixed;
      top:0;left:0;right:0;
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:1.25rem 4rem;
      background:rgba(13,13,13,.95);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(205,127,50,.1);
    }
    @media(max-width:900px){nav{padding:1.25rem 1.5rem}}
    .nav-back{
      display:flex;
      align-items:center;
      gap:.75rem;
      font-size:.75rem;
      font-weight:500;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--cream-dim);
      text-decoration:none;
      transition:color .3s;
    }
    .nav-back:hover{color:var(--copper)}
    .nav-back::before{content:'←'}
    .nav-logo h1{
      font-family:'Bebas Neue',sans-serif;
      font-size:1.4rem;
      letter-spacing:.08em;
      color:var(--cream);
    }
    /* HERO */
    .hero{
      padding:10rem 4rem 5rem;
      text-align:center;
    }
    .hero .label{margin-bottom:1rem}
    .hero h2{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(3rem,8vw,6rem);
      line-height:.95;
      margin-bottom:1rem;
    }
    .hero p{
      font-size:1rem;
      color:var(--text);
      max-width:500px;
      margin:0 auto 2rem;
    }
    /* GALLERY GRID */
    .gallery{
      padding:2rem 4rem 8rem;
      columns:4;
      column-gap:1rem;
    }
    @media(max-width:1200px){.gallery{columns:3}}
    @media(max-width:900px){.gallery{columns:2;padding:2rem 1.5rem 4rem}}
    @media(max-width:600px){.gallery{columns:1}}
    .gallery-item{
      break-inside:avoid;
      margin-bottom:1rem;
      cursor:pointer;
      position:relative;
      overflow:hidden;
    }
    .gallery-item img{
      width:100%;
      display:block;
      filter:brightness(.9);
      transition:all .4s;
    }
    .gallery-item:hover img{
      filter:brightness(1);
      transform:scale(1.03);
    }
    /* LIGHTBOX */
    .lightbox{
      display:none;
      position:fixed;
      inset:0;
      z-index:1000;
      background:rgba(0,0,0,.95);
      align-items:center;
      justify-content:center;
      padding:2rem;
    }
    .lightbox.active{display:flex}
    .lightbox img{
      max-width:90vw;
      max-height:90vh;
      object-fit:contain;
    }
    .lightbox-close{
      position:absolute;
      top:1.5rem;
      right:1.5rem;
      font-size:2rem;
      color:var(--cream);
      cursor:pointer;
      width:44px;
      height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.1);
      border-radius:50%;
      transition:background .3s;
      border:none;
    }
    .lightbox-close:hover{background:rgba(255,255,255,.2)}
    .lightbox-nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      font-size:2rem;
      color:var(--cream);
      cursor:pointer;
      width:50px;
      height:50px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.1);
      border-radius:50%;
      transition:background .3s;
      user-select:none;
      border:none;
    }
    .lightbox-nav:hover{background:rgba(255,255,255,.2)}
    .lightbox-prev{left:1.5rem}
    .lightbox-next{right:1.5rem}
    .lightbox-counter{
      position:absolute;
      bottom:1.5rem;
      left:50%;
      transform:translateX(-50%);
      font-family:'Bebas Neue',sans-serif;
      font-size:1rem;
      letter-spacing:.2em;
      color:var(--cream-dim);
    }
    /* FOOTER */
    footer{
      padding:3rem 4rem;
      background:var(--bg-soft);
      border-top:1px solid rgba(205,127,50,.1);
      text-align:center;
    }
    footer p{
      font-size:.75rem;
      color:var(--text);
      letter-spacing:.1em;
    }
    footer a{
      color:var(--copper);
      text-decoration:none;
    }
    footer a:hover{text-decoration:underline}
  </style>
</head>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <button class="lightbox-nav lightbox-prev" onclick="prevPhoto()">‹</button>
  <img id="lightbox-img" src="" alt="Build photo"/>
  <div class="lightbox-counter"><span id="counter">1 / 48</span></div>
  <button class="lightbox-nav lightbox-next" onclick="nextPhoto()">›</button>
</div>

<script>
  const photos=document.querySelectorAll('.gallery-item img');
  const lightbox=document.getElementById('lightbox');
  const lightboxImg=document.getElementById('lightbox-img');
  const counter=document.getElementById('counter');
  let currentIndex=0;

  window.openLightbox=function(index){
    currentIndex=index;
    updateLightbox();
    lightbox.classList.add('active');
    document.body.style.overflow='hidden';
  };

  function updateLightbox(){
    lightboxImg.src=photos[currentIndex].src;
    counter.textContent=(currentIndex+1)+' / '+photos.length;
  }

  window.closeLightbox=function(){
    lightbox.classList.remove('active');
    document.body.style.overflow='';
  };

  window.prevPhoto=function(){
    currentIndex=(currentIndex-1+photos.length)%photos.length;
    updateLightbox();
  };

  window.nextPhoto=function(){
    currentIndex=(currentIndex+1)%photos.length;
    updateLightbox();
  };

  document.addEventListener('keydown',(e)=>{
    if(!lightbox.classList.contains('active'))return;
    if(e.key==='Escape')closeLightbox();
    if(e.key==='ArrowLeft')prevPhoto();
    if(e.key==='ArrowRight')nextPhoto();
  });

  lightbox.addEventListener('click',(e)=>{
    if(e.target===lightbox)closeLightbox();
  });
</script>
